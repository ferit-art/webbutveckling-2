<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <main>
        <section>tryck här</section>
    </main>
    <script>
        function init() {
            let flag = document.querySelector("section");

            flag.addEventListener("click", function (e) {
                let parent = document.querySelector("main");

                for (let index = 0; index < 3; index++) {

                    if (index < 2) {
                        let element = document.createElement("section");
                        element.innerHTML = "section";
                        parent.appendChild(element);

                        if (index == 0) {
                            let parent2 = element;
                            for (let index2 = 0; index2 < 3; index2++) {
                                if (index2 < 2) {
                                    let element2 = document.createElement("p");
                                    element2.innerHTML = "p";
                                    parent2.appendChild(element2);
                                } else {
                                    let element2 = document.createElement("h3");
                                    element2.innerHTML = "vällkommen";
                                    parent2.prepend(element2);
                                }
                            }
                        }
                    } else {
                        element = document.createElement("h2");
                        element.innerHTML = "Vällkommen";
                        parent.prepend(element);
                    }
                }
            });
        }
        init();
    </script>
</body>

</html>
