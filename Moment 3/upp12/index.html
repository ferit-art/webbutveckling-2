<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .team-logo {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            margin-right: 5px;
        }

        .team {
            text-align: left;
        }
    </style>
</head>

<body>
    <table id="standingsTable">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Lag</th>
                <th>GP</th>
                <th>W</th>
                <th>OTW</th>
                <th>L</th>
                <th>OTL</th>
                <th>G</th>
                <th>GA</th>
                <th>Diff</th>
                <th>Poäng</th>
            </tr>
        </thead>
        <tbody id="standignsBody"></tbody>
    </table>
</body>
<script type="module">
    import { getScores } from "./functions.js";

    async function init() {
        let tbody = document.querySelector("tbody");
        const teams = await getScores();
        let table = document.querySelector("table");
        let content = new DocumentFragment();

        for (const team of teams) {
            let row = document.createElement("tr");

            for (let key in team) {
                if (key == "info") {
                    continue;
                } else if (key == "Rank") {
                    let cell = document.createElement("td");
                    cell.textContent = team[key];
                    row.appendChild(cell);

                    let infoCell = document.createElement("td");
                    infoCell.className = "team";
                    let img = document.createElement("img");
                    img.className = "team-logo";

                    img.src = team.info.logo;
                    infoCell.appendChild(img);
                    infoCell.appendChild(document.createTextNode(team.info.siteDisplayName));
                    row.appendChild(infoCell);
                } else {

                    let cell = document.createElement("td");
                    cell.textContent = team[key];
                    row.appendChild(cell);
                }
            }
            tbody.appendChild(row);
        }
    }
    init();
</script>

</html>
