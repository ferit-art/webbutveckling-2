    <script>
        const apiKey = "DEzNkVENzEyMkI2MjIiLCJ0eXAiOiJhdCt";

        async function deleteCustomer(id) {
            const response = await fetch('https://data.egyweb.se/api/company/deleteCustomer.php', {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Key ${apiKey}`
                },
                body: JSON.stringify({ id: id })
            });

            const data = await response.json();
            console.log(data);
            console.log("Successfull");
        }

        async function createCustomerWithJson() {
            const newCustomer = {

            };

            const response = await fetch('https://data.egyweb.se/api/company/createCustomer.php', {

                    'Content-Type': 'application/json',
                    'Authorization': `Key ${apiKey}`
                },
                body: JSON.stringify(newCustomer)
            });
